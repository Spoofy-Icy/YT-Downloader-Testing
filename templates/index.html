<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <nav class="navbar custom-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-lightning-charge-fill brand-icon"></i>
                <span class="brand-text ms-2">YT Downloader</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Search Box -->
                <div class="glass-card main-search-box p-4 p-md-5 text-center fade-in-up">
                    <h1 class="mb-4 gradient-text fw-bold">Download Any Video</h1>
                    <p class="text-muted mb-4">Fast, free, and secure YouTube video & audio downloader.</p>
                    
                    <form id="fetchForm" class="d-flex position-relative search-form">
                        <i class="bi bi-link-45deg link-icon"></i>
                        <input type="url" id="videoUrl" class="form-control custom-input" placeholder="Paste YouTube link here..." required>
                        <button type="submit" id="fetchBtn" class="btn custom-btn">
                            <span>Fetch</span>
                            <i class="bi bi-arrow-right ms-1"></i>
                        </button>
                    </form>
                    <div id="loader" class="mt-4 d-none">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2 text-muted">Fetching video info...</p>
                    </div>
                </div>

                <!-- Preview Box (Hidden initially) -->
                <div id="previewCard" class="glass-card mt-4 p-4 d-none fade-in-up delay-1">
                    <div class="row">
                        <!-- Thumbnail -->
                        <div class="col-md-5 mb-4 mb-md-0 position-relative text-center">
                            <div class="thumbnail-wrapper shadow-lg">
                                <img id="videoThumbnail" src="" class="img-fluid rounded" alt="Video Thumbnail">
                                <span id="videoDuration" class="duration-badge"></span>
                            </div>
                        </div>
                        <!-- Info -->
                        <div class="col-md-7 d-flex flex-column justify-content-center">
                            <h4 id="videoTitle" class="fw-bold mb-2"></h4>
                            <p class="text-muted mb-3"><i class="bi bi-person-circle me-2"></i><span id="videoUploader"></span></p>

                            <!-- Download Options Tabs -->
                            <ul class="nav nav-pills mb-3 custom-tabs" id="pills-tab" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="pills-video-tab" data-bs-toggle="pill" data-bs-target="#pills-video" type="button" role="tab">Video</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="pills-audio-tab" data-bs-toggle="pill" data-bs-target="#pills-audio" type="button" role="tab">Audio</button>
                                </li>
                            </ul>
                            
                            <!-- Tab Content -->
                            <div class="tab-content" id="pills-tabContent">
                                <div class="tab-pane fade show active" id="pills-video" role="tabpanel">
                                    <div id="videoOptions" class="d-flex flex-column gap-2"></div>
                                </div>
                                <div class="tab-pane fade" id="pills-audio" role="tabpanel">
                                    <div id="audioOptions" class="d-flex flex-column gap-2"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Error Message -->
                <div id="errorAlert" class="alert alert-danger mt-4 d-none custom-alert glass-card border-danger text-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i><span id="errorText"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
